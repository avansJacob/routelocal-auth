<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteLocal - Account Deletion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #F5F5F5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            max-width: 400px; 
            width: 100%; 
            text-align: center; 
            border: 1px solid #eaeaea;
        }
        
        /* EXACT FONT AND HEADER STYLES FROM CONFIRMATION PAGE */
        h1 { 
            margin-top: 0;
            font-size: 32px;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .brand-black { color: #000000; }
        .brand-orange { color: #FF5722; }
        
        h2 { 
            color: #222222; 
            font-size: 20px; 
            margin-top: 0; 
            margin-bottom: 16px; 
            font-weight: 600; 
        }
        p { 
            color: #555555; 
            font-size: 15px; 
            line-height: 1.5; 
            margin-bottom: 24px; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 16px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #FF5722; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s; 
        }
        button:hover { background-color: #E64A19; }
        button:disabled { background-color: #FFAB91; cursor: not-allowed; }
        
        .error { color: #D32F2F; font-size: 14px; margin-bottom: 16px; display: none; }
        .success { color: #388E3C; font-size: 16px; font-weight: bold; display: none; }
        #loginForm { display: block; }
        
        /* The Trash Icon Container */
        .icon-container {
            background-color: #FFEBEE; 
            color: #D32F2F; 
            width: 64px; 
            height: 64px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 16px auto;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 style="margin-bottom: 32px;">
        <span class="brand-black">Route</span><span class="brand-orange">Local</span>
    </h1>

    <div class="icon-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
    </div>

    <h2>Delete Account</h2>
    
    <div id="successMessage" class="success">
        Your account and all associated data have been permanently deleted.
    </div>

    <div id="loginForm">
        <p>To permanently delete your RouteLocal account and all your data, please verify your identity by logging in below.</p>
        
        <div id="errorMessage" class="error"></div>

        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <button id="deleteBtn" onclick="verifyAndDelete()">Verify & Delete My Account</button>
    </div>
</div>

<script>
    // 🚨 PASTE YOUR SUPABASE KEYS HERE
    const SUPABASE_URL = 'https://ajjokwiztuiphzmhftny.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqam9rd2l6dHVpcGh6bWhmdG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzQzNjcsImV4cCI6MjA4ODE1MDM2N30.rSKz3BJU3CJ5PqgCv7oucHk1UYcytXj4K7-wbfoQ9Gg';

    // 🚨 THE FIX: Renamed the variable to 'supabaseClient' so it doesn't clash!
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function verifyAndDelete() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('deleteBtn');
        const errorDiv = document.getElementById('errorMessage');

        if (!email || !password) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = "Please enter both email and password.";
            return;
        }

        btn.innerText = "Verifying...";
        btn.disabled = true;
        errorDiv.style.display = 'none';

        // 1. VERIFY THE USER (Using supabaseClient)
        const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (authError) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = "Incorrect email or password. Cannot delete account.";
            btn.innerText = "Verify & Delete My Account";
            btn.disabled = false;
            return;
        }

        // 2. TRIGGER THE DELETION (Using supabaseClient)
        btn.innerText = "Deleting Data...";
        const { error: rpcError } = await supabaseClient.rpc('delete_my_account');

        if (rpcError) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = "An error occurred while deleting your data. Please try again.";
            btn.innerText = "Verify & Delete My Account";
            btn.disabled = false;
            return;
        }

        // 3. WIPE THE SESSION & SHOW SUCCESS (Using supabaseClient)
        await supabaseClient.auth.signOut();
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('successMessage').style.display = 'block';
    }
</script>

</body>
</html>
