<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Confirmed - RouteLocal</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f5f5f5; 
            text-align: center; 
            padding: 20px; 
        }
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            max-width: 400px; 
            width: 100%; 
        }
        h1 { 
            color: #FF9800; /* RouteLocal Orange */
            margin-top: 0;
            font-size: 28px;
        }
        p { 
            color: #555; 
            line-height: 1.6; 
            font-size: 16px;
        }
        .highlight {
            font-weight: bold;
            color: #222;
            margin-top: 24px;
            padding: 12px;
            background-color: #FFF3E0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 Confirmed!</h1>
        <p>Your email address has been successfully verified.</p>
        <div class="highlight">
            You can now safely close this browser window, return to the RouteLocal app, and Sign In.
        </div>
    </div>
</body>
</html>
