<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Confirmed - RouteLocal</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f5f5f5; 
            text-align: center; 
            padding: 20px; 
        }
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            max-width: 400px; 
            width: 100%; 
            border: 1px solid #eaeaea;
        }
        h1 { 
            margin-top: 0;
            font-size: 32px;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .brand-black { color: #000000; }
        .brand-orange { color: #FF5722; }
        
        h2 {
            color: #222222;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 16px;
        }
        p { 
            color: #555555; 
            line-height: 1.6; 
            font-size: 16px;
            margin-bottom: 24px;
        }
        .highlight {
            font-weight: 500;
            color: #222222;
            padding: 16px;
            background-color: #FFF3EE;
            border-radius: 8px;
            border-left: 4px solid #FF5722;
            text-align: left;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            <span class="brand-black">Route</span><span class="brand-orange">Local</span>
        </h1>
        
        <h2>🎉 Confirmed!</h2>
        <p>Your email address has been successfully verified.</p>
        
        <div class="highlight">
            <strong>Next Step:</strong> You can now safely close this browser window, return to the RouteLocal app, and Sign In with the same email and password you used to create the account.
        </div>
    </div>
</body>
</html>
